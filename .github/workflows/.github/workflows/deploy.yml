name: Generate Science Blog

  on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'  # Run every Sunday at 2 AM UTC

      jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

          steps:
    - uses: actions/checkout@v3

          - name: Set up Python
                  uses: actions/setup-python@v4
                          with:
                            python-version: '3.10'

                        - name: Install dependencies
                                run: |
                                          python -m pip install --upgrade pip
                                          pip install -r requirements.txt

                                      - name: Generate site
                                              env:
        WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
        WP_USERNAME: ${{ secrets.WP_USERNAME }}
        WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        SITE_URL: https://juanmoisesd.github.io/science-blog
        BATCH_SIZE: 100
                  REQUEST_TIMEOUT: 30
                            RETRY_ATTEMPTS: 3
                                    run: python site_builder.py

                                          - name: Commit and push if changes
                                                  run: |
                                                    git config --global user.name 'GitHub Actions'
                                                    git config --global user.email 'actions@github.com'
                                                    git add -A
                                                    if [ -n "$(git status --porcelain)" ]; then
                                                      git commit -m "🚀 Auto-generate science blog content - $(date +'%Y-%m-%d %H:%M:%S')"
                                                      git push
                                                    fi
                                                  env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
